<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImportAuto | Calculadora de Importación</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
min-height:100vh;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
}

.header{
text-align:center;
margin-bottom:30px;
}

.logo{
font-size:2.5rem;
font-weight:800;
}

.logo span{
color:#3b82f6;
}

.subtitle{
color:#cbd5e1;
margin-top:10px;
}

.card{
background:rgba(255,255,255,.08);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,.1);
border-radius:24px;
padding:25px;
box-shadow:0 25px 50px rgba(0,0,0,.35);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

@media(max-width:768px){
.grid{
grid-template-columns:1fr;
}
}

.input-group label{
display:block;
margin-bottom:8px;
font-weight:600;
}

.input-group input{
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:rgba(255,255,255,.12);
color:white;
font-size:18px;
}

.input-group input:focus{
outline:none;
}

.results{
margin-top:25px;
}

.row{
display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid rgba(255,255,255,.08);
}

.total{
margin-top:25px;
background:linear-gradient(135deg,#16a34a,#22c55e);
padding:25px;
border-radius:18px;
text-align:center;
}

.total h2{
font-size:15px;
margin-bottom:10px;
}

.total .usd{
font-size:2.5rem;
font-weight:800;
}

.total .crc{
font-size:1.1rem;
margin-top:8px;
}

.buttons{
margin-top:20px;
display:flex;
gap:10px;
}

button{
flex:1;
padding:14px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:700;
}

.copy{
background:#3b82f6;
color:white;
}

.clear{
background:#ef4444;
color:white;
}

.history{
margin-top:30px;
}

.history h3{
margin-bottom:15px;
}

.history-item{
background:rgba(255,255,255,.06);
padding:12px;
border-radius:12px;
margin-bottom:10px;
font-size:14px;
}
</style>

</head>
<body>

<div class="container">

<div class="header">
<div class="logo">Import<span>Auto</span></div>
<p class="subtitle">
Calculadora de Importación de Vehículos Costa Rica
</p>
</div>

<div class="card">

<div class="grid">

<div class="input-group">
<label>Valor del vehículo (USD)</label>
<input type="number" id="vehiculo" value="5000" oninput="calcular()">
</div>

<div class="input-group">
<label>Tipo de cambio CRC/USD</label>
<input type="number" id="tipoCambio" value="456" oninput="calcular()">
</div>

</div>

<div class="results">

<div class="row"><span>Flete</span><span>$1,375.00</span></div>
<div class="row"><span>Seguro</span><span>$100.00</span></div>
<div class="row"><span>Base Imponible</span><span id="base">$0</span></div>
<div class="row"><span>Impuestos (65%)</span><span id="impuestos">$0</span></div>
<div class="row"><span>Grúa</span><span>$300.00</span></div>
<div class="row"><span>Agencia Aduanera</span><span>$300.00</span></div>
<div class="row"><span>Inscripción</span><span>$87.00</span></div>
<div class="row"><span>DEKRA</span><span>$22.00</span></div>
<div class="row"><span>Otros</span><span>$435.00</span></div>

</div>

<div class="total">
<h2>COSTO TOTAL ESTIMADO</h2>
<div class="usd" id="totalUSD">$0</div>
<div class="crc" id="totalCRC">₡0</div>
</div>

<div class="buttons">
<button class="copy" onclick="copiarCotizacion()">
Copiar Cotización
</button>

<button class="clear" onclick="limpiar()">
Limpiar
</button>
</div>

</div>

<div class="history">
<h3>Historial</h3>
<div id="historial"></div>
</div>

</div>

<script>

function money(v){
return v.toLocaleString('en-US',{
style:'currency',
currency:'USD'
});
}

function crc(v){
return '₡' + v.toLocaleString('es-CR',{
maximumFractionDigits:0
});
}

function calcular(){

const vehiculo =
parseFloat(document.getElementById('vehiculo').value) || 0;

const tc =
parseFloat(document.getElementById('tipoCambio').value) || 456;

const base =
vehiculo + 1375 + 100;

const impuestos =
base * 0.65;

const total =
base +
impuestos +
300 +
300 +
87 +
22 +
435;

document.getElementById('base').innerText =
money(base);

document.getElementById('impuestos').innerText =
money(impuestos);

document.getElementById('totalUSD').innerText =
money(total);

document.getElementById('totalCRC').innerText =
crc(total * tc);

guardarHistorial(vehiculo,total);
}

function copiarCotizacion(){

const texto =
document.getElementById('totalUSD').innerText;

navigator.clipboard.writeText(texto);

alert('Cotización copiada');
}

function limpiar(){

document.getElementById('vehiculo').value='';

calcular();
}

function guardarHistorial(vehiculo,total){

if(!vehiculo) return;

let historial =
JSON.parse(localStorage.getItem('importauto') || '[]');

historial.unshift({
vehiculo,
total,
fecha:new Date().toLocaleDateString()
});

historial = historial.slice(0,10);

localStorage.setItem(
'importauto',
JSON.stringify(historial)
);

mostrarHistorial();
}

function mostrarHistorial(){

const historial =
JSON.parse(localStorage.getItem('importauto') || '[]');

const div =
document.getElementById('historial');

div.innerHTML='';

historial.forEach(item=>{

div.innerHTML += `
<div class="history-item">
Vehículo: ${money(item.vehiculo)}
<br>
Total: ${money(item.total)}
<br>
${item.fecha}
</div>
`;

});
}

calcular();
mostrarHistorial();

</script>

</body>
</html>
